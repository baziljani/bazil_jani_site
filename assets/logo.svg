<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="url(#logoGradient)"/>
  <!-- Text BJ -->
  <text x="100" y="115" font-family="Poppins, sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="middle">BJ</text>
</svg>
